<!DOCTYPE html>
<html>
<head>
<title>For Nandani ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.box {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  font-size:20px;
}

p {
  font-size:14px;
  opacity:0.9;
}

button {
  padding:10px 18px;
  margin:10px;
  border:none;
  border-radius:25px;
  background:#ff4b5c;
  color:white;
  font-size:14px;
  cursor:pointer;
}

button:hover {
  transform:scale(1.1);
}

img {
  width:120px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="box" id="app"></div>

<script>

let step = 0;

let data = [

{
q:"🍽️ Nandani khana kha li?",
msg:"Khud ka khayal rakhna bhi zaruri hai ❤️"
},

{
q:"📚 Abhi padhai kar rahi ho?",
msg:"Future doctor banne wali ho tum 👩‍⚕️🔥"
},

{
q:"💤 Thak gayi ho kya?",
msg:"Thodi rest bhi zaruri hai 😌"
},

{
q:"📖 Aaj kitna padha?",
msg:"Consistency hi success deta hai 💯"
},

{
q:"💖 Mujhe miss karti ho?",
msg:"Sach sach bolna 😏"
},

{
q:"😊 Smile kar rahi ho?",
msg:"Tumhari smile sabse best hai 😍"
},

{
q:"💧 Pani piya?",
msg:"Health first always 💪"
},

{
q:"🏠 Ghar pe sab thik?",
msg:"Sab khush rahe bas ❤️"
},

{
q:"😂 Mood kaisa hai?",
msg:"Happy rehna important hai 😄"
},

{
q:"💰 Nandani aapko paisa dena hai?",
msg:"Main hu na 😉"
}

];

function show(){

let d = data[step];

document.getElementById("app").innerHTML = `
<img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdzl2a3g0cHc1b2c2cWJzN3k3eTVpM2RkYzFzY3ZtOG1xZ2p2b2Q0YiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/MDJ9IbxxvDUQM/giphy.gif">

<h2>${d.q}</h2>
<p>${d.msg}</p>

<button onclick="yes()">Haa 😊</button>
<button onclick="no()">Naa 😒</button>
`;
}

function yes(){
step++;
if(step < data.length){
show();
}else{
document.getElementById("app").innerHTML = `
<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
<h2>💖 You are special Nandani 💖</h2>
<p>Main hamesha tumhare sath hu ❤️</p>
`;
}
}

function no(){
document.getElementById("app").innerHTML = `
<img src="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif">
<h2>😡 Ye kya baat hui?</h2>
<p>Thoda dhyan rakho apna 😤</p>
<button onclick="show()">Theek hai ab kar li 😅</button>
`;
}

show();

</script>

</body>
</html>
